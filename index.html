

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Nadeeshi">
    <title>Nadeeshi  Portfolio</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #f0f6fb;
            color: #1a1a2e;
            width: 100%;
            overflow-x: hidden;
        }

        /* ── NAVBAR ── */

        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 65px;
            background-color: rgba(240, 246, 251, 0.9);
            border-bottom: 2px solid #5eb8d4;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 60px;
            z-index: 999;
        }

        #logo {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.5rem;
            color: #1a1a2e;
            text-decoration: none;
        }

        #nav-list {
            list-style: none;
            display: flex;
            gap: 40px;
        }

        #nav-list a {
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            color: #1a1a2e;
        }

        #nav-list a:hover {
            color: #5eb8d4;
        }

        #nav-icons {
            display: flex;
            gap: 12px;
        }

        #nav-icons a {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #e4f1f8;
            border: 1.5px solid #5eb8d4;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #1a1a2e;
        }

        #nav-icons a:hover {
            background-color: #5eb8d4;
            color: white;
        }

        #nav-icons svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* ── HERO ── */

        #hero {
            width: 100%;
            height: 100vh;
            background-color: #f0f6fb;
            border-bottom: 2px solid #5eb8d4;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 80px;
            position: relative;
            overflow: hidden;
        }

        #hero-blob {
            position: absolute;
            top: -10%;
            right: -5%;
            width: 55%;
            height: 90%;
            background: radial-gradient(ellipse at 60% 40%, #c8e8f5 0%, #a8d8ed 40%, transparent 75%);
            border-radius: 50% 40% 60% 50% / 50% 60% 40% 50%;
            z-index: 0;
        }

        #hero-text {
            position: relative;
            z-index: 1;
        }

        #hero-text h1 {
            font-family: 'Playfair Display', serif;
            font-size: 5rem;
            font-weight: 900;
            line-height: 1.05;
            color: #1a1a2e;
            margin-bottom: 16px;
        }

        #hero-text p {
            font-size: 0.95rem;
            color: #5a6a7a;
            margin-bottom: 36px;
        }

        #hero-buttons {
            display: flex;
            gap: 16px;
        }

        #btn-work {
            padding: 12px 28px;
            background-color: #5eb8d4;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
        }

        #btn-cv {
            padding: 12px 28px;
            background-color: transparent;
            color: #1a1a2e;
            border: 1.5px solid #5eb8d4;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
        }

        #btn-work:hover {
            background-color: #3a9ab8;
        }

        #btn-cv:hover {
            background-color: #5eb8d4;
            color: white;
        }

        #hero-image {
            position: relative;
            z-index: 1;
        }

        #hero-image img {
            width: 320px;
            border-radius: 24px;
            display: block;
            object-fit: cover;
            object-position: top;
        }

        #badge {
            position: absolute;
            bottom: 20px;
            left: -30px;
            background-color: white;
            border-radius: 12px;
            padding: 10px 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.78rem;
            font-weight: 500;
        }

        #dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #4ade80;
        }

        /* ── ABOUT ── */

        #about {
            width: 100%;
            background-color: #e4f1f8;
            border-bottom: 2px solid #5eb8d4;
            padding: 80px;
            display: flex;
            gap: 60px;
            align-items: center;
        }

        #about-text {
            flex: 1;
        }

        #about-label {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #5eb8d4;
            margin-bottom: 8px;
        }

        #about-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.4rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 16px;
        }

        #about-desc {
            font-size: 0.95rem;
            color: #5a6a7a;
            line-height: 1.7;
            max-width: 480px;
        }

        #about-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 28px;
        }

        .stat-card {
            background-color: white;
            border-radius: 16px;
            padding: 18px 22px;
            border: 1px solid #5eb8d4;
        }

        .stat-num {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 900;
            color: #5eb8d4;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #5a6a7a;
            margin-top: 4px;
        }

        #about-img {
            flex: 1;
            height: 380px;
            background: linear-gradient(135deg, #c8e8f5, #a8d8ed);
            border-radius: 24px;
            border: 2px solid #5eb8d4;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
        }

        /* ── WORKS ── */

        #works {
            width: 100%;
            background-color: #f0f6fb;
            border-bottom: 2px solid #5eb8d4;
            padding: 80px;
        }

        #works-label {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #5eb8d4;
            margin-bottom: 8px;
        }

        #works-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.4rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 40px;
        }

        #works-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .work-card {
            background-color: white;
            border-radius: 20px;
            overflow: hidden;
            border: 1.5px solid #5eb8d4;
        }

        .work-thumb {
            height: 180px;
            background: linear-gradient(135deg, #c8e8f5, #8ac8e0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .work-info {
            padding: 20px 22px;
        }

        .work-info h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.05rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 6px;
        }

        .work-info p {
            font-size: 0.82rem;
            color: #5a6a7a;
            line-height: 1.5;
        }

        .tag {
            display: inline-block;
            margin-top: 10px;
            padding: 4px 12px;
            background-color: #e4f1f8;
            border-radius: 20px;
            font-size: 0.72rem;
            color: #3a9ab8;
            font-weight: 500;
        }

        /* ── CONTACT ── */

        #contact {
            width: 100%;
            background-color: #e4f1f8;
            border-bottom: 2px solid #5eb8d4;
            padding: 80px;
            display: flex;
            gap: 60px;
            align-items: center;
        }

        #contact-text {
            flex: 1;
        }

        #contact-label {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #5eb8d4;
            margin-bottom: 8px;
        }

        #contact-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.4rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 16px;
        }

        #contact-desc {
            font-size: 0.95rem;
            color: #5a6a7a;
            line-height: 1.7;
        }

        #contact-form {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        #form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 0.8rem;
            font-weight: 500;
            color: #5a6a7a;
        }

        .form-group input,
        .form-group textarea {
            padding: 12px 16px;
            border-radius: 10px;
            border: 1.5px solid #5eb8d4;
            background-color: white;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            color: #1a1a2e;
            outline: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #3a9ab8;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        #btn-send {
            padding: 12px 28px;
            background-color: #5eb8d4;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            align-self: flex-start;
        }

        #btn-send:hover {
            background-color: #3a9ab8;
        }

        /* ── FOOTER ── */

        footer {
            width: 100%;
            background-color: #1a1a2e;
            padding: 28px 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #footer-logo {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.3rem;
            color: white;
        }

        #footer-links {
            list-style: none;
            display: flex;
            gap: 24px;
        }

        #footer-links a {
            text-decoration: none;
            font-size: 0.82rem;
            color: rgba(255,255,255,0.5);
        }

        #footer-links a:hover {
            color: #5eb8d4;
        }

        #footer-copy {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.4);
        }

    </style>
</head>
